nameOverride: ""
fullnameOverride: ""

image:
  storage:
    repository: "ghcr.io/y-scope/spider/storage"
    pullPolicy: "Always"
    tag: "main"

spiderConfig:
  database:
    # Used only when the bundled MariaDB is disabled (`mariadb.enabled: false`). When bundled, the
    # host/port/name/credentials come from the `mariadb` subchart below instead.
    host: "127.0.0.1"
    port: 3306
    username: "spider-user"
    password: "spider-password"
    name: "spider-db"

  storage_endpoint:
    port: 50051

  storage:
    max_connections: 64
    # task_instance_pool_config:
    #   execution_manager_stale_cutoff_sec: 30
    #   gc_interval_sec: 5
    #   message_channel_capacity: 1024
    # job_cache_gc_config:
    #   terminated_job_retention_sec: 300
    #   gc_interval_sec: 10
    ready_queue_config:
      task_capacity: 1048576
      commit_capacity: 256
      cleanup_capacity: 256

# Bundled MariaDB, provided by the groundhog2k `mariadb` subchart (a thin wrapper over the official
# `docker.io/mariadb` image). Set `enabled: false` to use an external database (then configure
# `spiderConfig.database` above). All keys below follow the subchart's own schema, not Spider's.
mariadb:
  enabled: true
  image:
    tag: "11.4"
  settings:
    rootPassword:
      value: "spider-root-password"
  userDatabase:
    name:
      value: "spider-db"
    user:
      value: "spider-user"
    password:
      value: "spider-password"
  storage:
    requestedSize: "20Gi"
