apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: {{ include "spider.componentFullname" (dict "root" . "component" "scheduler") }}
  labels:
    {{- include "spider.labels" . | nindent 4 }}
    app.kubernetes.io/component: "scheduler"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spider.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: "scheduler"
  template:
    metadata:
      labels:
        {{- include "spider.labels" . | nindent 8 }}
        app.kubernetes.io/component: "scheduler"
    spec:
      initContainers:
        # The scheduler's `storage_endpoint.host` and `runtime.host` deserialize into `IpAddr`, so
        # a Service DNS name cannot be used. Resolve the storage Service to its ClusterIP and inject
        # this Pod's IP, rendering the config template into the shared "config" volume.
        - name: "render-config"
          image: {{ include "spider.imageRef" (dict "root" . "component" "scheduler") | quote }}
          imagePullPolicy: {{ .Values.image.scheduler.pullPolicy | quote }}
          command:
            - "sh"
            - "-c"
            - |
              set -eu
              storage_ip="$(getent hosts "$STORAGE_HOST" | head -n1 | tr -s ' ' | cut -d' ' -f1)"
              if [ -z "$storage_ip" ]; then
                echo "Failed to resolve storage host: $STORAGE_HOST" >&2
                exit 1
              fi
              sed \
                -e "s/__STORAGE_HOST__/${storage_ip}/" \
                -e "s/__SCHEDULER_HOST__/${SCHEDULER_HOST}/" \
                /etc/spider/template/scheduler.yaml > /etc/spider/scheduler.yaml
          env:
            - name: "STORAGE_HOST"
              value: {{ include "spider.componentFullname" (dict "root" . "component" "storage") | quote }}
            - name: "SCHEDULER_HOST"
              valueFrom:
                fieldRef:
                  fieldPath: "status.podIP"
          volumeMounts:
            - name: "config-template"
              mountPath: "/etc/spider/template"
              readOnly: true
            - name: "config"
              mountPath: "/etc/spider"
      containers:
        - name: "scheduler"
          image: {{ include "spider.imageRef" (dict "root" . "component" "scheduler") | quote }}
          imagePullPolicy: {{ .Values.image.scheduler.pullPolicy | quote }}
          command: ["spider-scheduler", "--config", "/etc/spider/scheduler.yaml"]
          ports:
            - name: "grpc"
              containerPort: {{ .Values.spiderConfig.scheduler_endpoint.port }}
          volumeMounts:
            - name: "config"
              mountPath: "/etc/spider"
              readOnly: true
          readinessProbe:
            {{- include "spider.readinessProbeTimings" . | nindent 12 }}
            tcpSocket:
              port: "grpc"
          livenessProbe:
            {{- include "spider.livenessProbeTimings" . | nindent 12 }}
            tcpSocket:
              port: "grpc"
      volumes:
        - name: "config-template"
          configMap:
            name: {{ include "spider.componentFullname" (dict "root" . "component" "config") }}
        - name: "config"
          emptyDir: {}
